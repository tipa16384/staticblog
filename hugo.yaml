baseURL: "https://chasingdings.com/"
title: Chasing Dings!
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Chasing Dings!
  description: "Come for the games, stay for the drama."
  keywords: [Blog, PaperMod]
  author: Tipa
  # author: ["Me", "You"] # multiple authors
  images: []
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "https://chasingdings.com/wp-content/uploads/2022/07/cropped-bmapprofilepicture-32x32.png"
    favicon16x16: "https://chasingdings.com/wp-content/uploads/2022/07/cropped-bmapprofilepicture-32x32.png"
    favicon32x32: "https://chasingdings.com/wp-content/uploads/2022/07/cropped-bmapprofilepicture-32x32.png"
    apple_touch_icon: "https://chasingdings.com/wp-content/uploads/2022/07/cropped-bmapprofilepicture-180x180.png"
    # safari_pinned_tab: "<link / abs url>"

  label:
    text: "Home"
    icon: "https://chasingdings.com/wp-content/uploads/2022/07/cropped-bmapprofilepicture-180x180.png"
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: Chasing Dings!
    subtitle: "This blog used to be funny"
    imageUrl: "https://chasingdings.com/wp-content/uploads/2024/01/dodologo-768x618.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Get Retro!"
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
#  homeInfoParams:
#    Title: "Hi there \U0001F44B"
#    Content: Welcome to my blog

  socialIcons:
    - name: x
      url: "https://x.com/"
    - name: stackoverflow
      url: "https://stackoverflow.com"
    - name: github
      url: "https://github.com/"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

  editPost:
    URL: "https://github.com/tipa16384/staticblog/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: categories
      name: categories
      url: /categories/
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
